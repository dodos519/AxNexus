/* ── LANCE INDEX CHART ── */
function LanceChart({data,size=120}){
  const max=100,min=40;
  const w=size*2.2,h=size*1.2;
  const pts=data.map((v,i)=>{
    const x=20+(i/(data.length-1))*(w-40);
    const y=h-20-((v-min)/(max-min))*(h-40);
    return [x,y];
  });
  const path="M"+pts.map(p=>p[0]+","+p[1]).join(" L");
  const fill=path+" L"+pts[pts.length-1][0]+","+(h-20)+" L"+pts[0][0]+","+(h-20)+" Z";
  return(
    <svg viewBox={"0 0 "+w+" "+h} width="100%">
      <defs>
        <linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#6366f1" stopOpacity="0.3"/>
          <stop offset="100%" stopColor="#6366f1" stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={fill} fill="url(#lg)"/>
      <path d={path} fill="none" stroke="#6366f1" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      {pts.map((p,i)=>(
        <g key={i}>
          <circle cx={p[0]} cy={p[1]} r="4" fill="#6366f1"/>
          <text x={p[0]} y={p[1]-8} textAnchor="middle" fontSize="10" fill="#6366f1" fontWeight="bold">{data[i]}</text>
        </g>
      ))}
    </svg>
  );
}

/* ── AI CHATBOT ── */
function AIChatbot({user}){
  const [open,setOpen]=useState(false);
  const [msgs,setMsgs]=useState([{role:"ai",text:"Hi "+user.name+"! How can I help you today? 🤖"}]);
  const [input,setInput]=useState("");
  const ref=useRef(null);
  useEffect(()=>{if(ref.current)ref.current.scrollTop=ref.current.scrollHeight;},[msgs]);
  const send=()=>{
    if(!input.trim())return;
    const q=input;setInput("");
    setMsgs(m=>[...m,{role:"user",text:q}]);
    setTimeout(()=>{
      const r=q.toLowerCase().includes("lance")?"The Lance Index measures academic performance across multiple dimensions. A score above 80 is excellent! 📊"
        :q.toLowerCase().includes("finance")?"Your current balance is RM 480. Last payment was RM 120 for Math on Jun 1. 💳"
        :"That's a great question! Let me look into that for you. Please speak to your teacher for detailed guidance. 📚";
      setMsgs(m=>[...m,{role:"ai",text:r}]);
    },800);
  };
  return(
    <>
      <button onClick={()=>setOpen(o=>!o)}
        className="fixed bottom-6 right-6 w-14 h-14 bg-indigo-600 text-white rounded-full shadow-xl flex items-center justify-center text-2xl hover:bg-indigo-700 transition-all z-40">
        {open?"✕":"🤖"}
      </button>
      {open&&(
        <div className="fixed bottom-24 right-6 w-80 bg-white rounded-2xl shadow-2xl border border-gray-100 z-40 pop flex flex-col" style={{height:400}}>
          <div className="p-4 border-b border-gray-100 bg-indigo-600 rounded-t-2xl">
            <p className="font-semibold text-white text-sm">🤖 AxNexus Assistant</p>
          </div>
          <div ref={ref} className="flex-1 p-4 overflow-y-auto space-y-3">
            {msgs.map((m,i)=>(
              <div key={i} className={"flex "+(m.role==="user"?"justify-end":"justify-start")}>
                <div className={"max-w-[85%] px-3 py-2 rounded-xl text-sm "+(m.role==="user"?"bg-indigo-600 text-white":"bg-gray-100 text-gray-800")}>
                  {m.text}
                </div>
              </div>
            ))}
          </div>
          <div className="p-3 border-t border-gray-100 flex gap-2">
            <input value={input} onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&send()}
              className="flex-1 px-3 py-2 border border-gray-200 rounded-xl text-sm"
              placeholder="Ask anything…"/>
            <Btn onClick={send} cls="bg-indigo-600 text-white hover:bg-indigo-700">Send</Btn>
          </div>
        </div>
      )}
    </>
  );
}

/* ── APP ROOT ── */
function App(){
  const [lang,setLang]=useState("en");
  const toggle=()=>setLang(l=>l==="en"?"zh":"en");
  const [user,setUser]=useState(null);
  const [students,setStudents]=useState(STUDENTS);
  const [teachers]=useState(TEACHERS);
  const [sessions]=useState(SESSIONS);
  const [discussions,setDiscussions]=useState(DISCUSSIONS);
  const [mode,setMode]=useState("tuition");
  const cp={students,sessions,teachers,discussions,setDiscussions};
  return(
    <LangCtx.Provider value={{lang,toggle}}>
      {!user
        ?<LoginPage onLogin={u=>setUser({...u})} mode={mode} setMode={setMode}/>
        :<>
          {user.role==="teacher"&&<TeacherApp user={user} {...cp} onLogout={()=>setUser(null)}/>}
          {user.role==="student"&&<StudentApp user={user} {...cp} onLogout={()=>setUser(null)}/>}
          {user.role==="parent"&&<ParentApp user={user} {...cp} onLogout={()=>setUser(null)}/>}
          {user.role==="admin"&&<AdminApp user={user} {...cp} mode={mode} onLogout={()=>setUser(null)}/>}
          <AIChatbot user={user}/>
        </>
      }
    </LangCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
